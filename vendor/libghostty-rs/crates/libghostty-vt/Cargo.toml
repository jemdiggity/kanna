[package]
name = "libghostty-vt"
description = "Safe Rust API for libghostty-vt, the Ghostty terminal emulation library"
version = "0.1.1"
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/uzaaft/libghostty-rs"
rust-version = "1.93"

[features]
allocator_api = ["dep:allocator-api2"]

[dependencies]
allocator-api2 = { version = "0.4.0", optional = true }
bitflags = "2.11.0"
libghostty-vt-sys = { path = "../libghostty-vt-sys", version = "0.1.1" }
int-enum = "1.2.0"

[dev-dependencies]
libghostty-vt-sys = { path = "../libghostty-vt-sys", version = "0.1.1" }

[package.metadata.docs.rs]
all-features = true
