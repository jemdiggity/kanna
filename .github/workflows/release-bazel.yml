name: Bazel Release

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-apps:
    name: Release Apps
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Set up Rust
        run: rustup default stable

      - name: Install Bazel and Zig
        run: brew install bazelisk zig

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build unsigned release apps
        run: bazel build -c opt //:release_apps

      - name: Analyze signed DMG graph
        run: bazel build --nobuild -c opt //:release_signed_dmgs
