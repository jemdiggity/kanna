name: Bazel Release

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-apps:
    name: Release Apps
    runs-on: macos-14
    env:
      BAZEL_DISK_CACHE: ~/.cache/kanna-bazel/disk
      BAZEL_REPOSITORY_CACHE: ~/.cache/kanna-bazel/repository

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Set up Rust
        run: rustup default stable

      - name: Install Bazel and Zig
        run: brew install bazelisk zig

      - name: Restore Bazel caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/kanna-bazel
          key: ${{ runner.os }}-bazel-${{ hashFiles('.bazelversion', 'MODULE.bazel.lock', 'apps/desktop/src-tauri/Cargo.lock', 'crates/daemon/Cargo.lock', 'crates/kanna-cli/Cargo.lock', 'packages/terminal-recovery/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build unsigned release apps
        run: bazel build -c opt --disk_cache="$BAZEL_DISK_CACHE" --repository_cache="$BAZEL_REPOSITORY_CACHE" //:release_apps

      - name: Analyze signed DMG graph
        run: bazel build --nobuild -c opt --disk_cache="$BAZEL_DISK_CACHE" --repository_cache="$BAZEL_REPOSITORY_CACHE" //:release_signed_dmgs
